<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Backlink Desk</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Workspace">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">DC</div>
          <div>
            <h1>dr. croley</h1>
            <p>Outreach pipeline</p>
          </div>
        </div>

        <nav class="nav-stack" aria-label="Views">
          <button class="nav-item is-active" data-view="all" type="button">
            <span aria-hidden="true">#</span>
            Pipeline
          </button>
          <button class="nav-item" data-view="due" type="button">
            <span aria-hidden="true">@</span>
            Follow-ups
          </button>
          <button class="nav-item" data-view="live" type="button">
            <span aria-hidden="true">OK</span>
            Live Links
          </button>
        </nav>

        <div class="sidebar-panel">
          <label for="importCsv" class="file-button">Import CSV</label>
          <input id="importCsv" class="sr-only" type="file" accept=".csv,text/csv">
          <button id="exportCsv" class="secondary-button" type="button">Export CSV</button>
        </div>
      </aside>

      <main class="main-area">
        <header class="topbar">
          <div>
            <p class="eyebrow">SEO workflow</p>
            <h2>DC / dr. croley Backlink CRM</h2>
          </div>
          <div class="topbar-actions">
            <button id="seedData" class="secondary-button" type="button">Sample Data</button>
            <button id="addProspect" class="primary-button" type="button">Add Prospect</button>
          </div>
        </header>

        <section class="metrics-grid" aria-label="Backlink metrics">
          <article class="metric">
            <span>Total Prospects</span>
            <strong id="metricTotal">0</strong>
          </article>
          <article class="metric">
            <span>Due Follow-ups</span>
            <strong id="metricDue">0</strong>
          </article>
          <article class="metric">
            <span>Live Links</span>
            <strong id="metricLive">0</strong>
          </article>
          <article class="metric">
            <span>Avg DR</span>
            <strong id="metricDr">0</strong>
          </article>
        </section>

        <section class="toolbar" aria-label="Filters">
          <div class="search-wrap">
            <label class="sr-only" for="searchInput">Search prospects</label>
            <input id="searchInput" type="search" placeholder="Search domain, niche, contact, status">
          </div>
          <label class="select-wrap">
            <span class="sr-only">Status</span>
            <select id="statusFilter">
              <option value="">All statuses</option>
              <option>Not Contacted</option>
              <option>Drafted</option>
              <option>Sent</option>
              <option>Follow Up 1</option>
              <option>Follow Up 2</option>
              <option>Replied</option>
              <option>Accepted</option>
              <option>Live</option>
              <option>Rejected</option>
              <option>Lost</option>
            </select>
          </label>
          <button id="bulkDrafts" class="secondary-button" type="button">Generate Drafts</button>
        </section>

        <section class="table-shell" aria-label="Prospects">
          <table>
            <thead>
              <tr>
                <th>Domain</th>
                <th>Niche</th>
                <th>Contact</th>
                <th>DR</th>
                <th>Status</th>
                <th>Next Follow-up</th>
                <th>Link Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="prospectRows"></tbody>
          </table>
          <div id="emptyState" class="empty-state">
            <strong>No prospects yet</strong>
            <button class="primary-button" data-empty-add type="button">Add Prospect</button>
          </div>
        </section>
      </main>
    </div>

    <dialog id="prospectDialog">
      <form id="prospectForm" method="dialog">
        <div class="dialog-head">
          <h3 id="dialogTitle">Add Prospect</h3>
          <button class="icon-button" value="cancel" aria-label="Close" type="button" data-close-dialog>x</button>
        </div>

        <input type="hidden" id="prospectId">

        <div class="form-grid">
          <label>
            Domain
            <input id="domain" required placeholder="example.com">
          </label>
          <label>
            Prospect URL
            <input id="prospectUrl" type="url" placeholder="https://example.com/resources">
          </label>
          <label>
            Contact Email
            <input id="contactEmail" type="email" placeholder="editor@example.com">
          </label>
          <label>
            Contact Name
            <input id="contactName" placeholder="Alex">
          </label>
          <label>
            Niche
            <input id="niche" placeholder="Local SEO">
          </label>
          <label>
            DR
            <input id="dr" type="number" min="0" max="100" placeholder="45">
          </label>
          <label>
            Status
            <select id="status">
              <option>Not Contacted</option>
              <option>Drafted</option>
              <option>Sent</option>
              <option>Follow Up 1</option>
              <option>Follow Up 2</option>
              <option>Replied</option>
              <option>Accepted</option>
              <option>Live</option>
              <option>Rejected</option>
              <option>Lost</option>
            </select>
          </label>
          <label>
            Last Contacted
            <input id="lastContacted" type="date">
          </label>
          <label>
            Target URL
            <input id="targetUrl" type="url" placeholder="https://your-site.com/guide">
          </label>
          <label>
            Anchor
            <input id="anchor" placeholder="SEO automation guide">
          </label>
          <label class="full-field">
            Live Backlink URL
            <input id="liveUrl" type="url" placeholder="https://example.com/article">
          </label>
          <label class="full-field">
            Notes
            <textarea id="notes" rows="3"></textarea>
          </label>
        </div>

        <div class="dialog-actions">
          <button class="secondary-button" value="cancel" type="button" data-close-dialog>Cancel</button>
          <button class="primary-button" id="saveProspect" value="default" type="submit">Save Prospect</button>
        </div>
      </form>
    </dialog>

    <dialog id="draftDialog">
      <div class="dialog-head">
        <h3>Email Draft</h3>
        <button class="icon-button" aria-label="Close" type="button" data-close-draft>x</button>
      </div>
      <textarea id="draftText" rows="13"></textarea>
      <div class="dialog-actions">
        <button id="copyDraft" class="primary-button" type="button">Copy Draft</button>
      </div>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
